<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Swing Trader India</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <div class="container-fluid">
    <a class="navbar-brand" href="../index.html">Swing Trader India</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link" href="../index.html">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="watchlist.html">Watchlist</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="signals.html">Signals</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="settings.html">Settings</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
    <h1>Settings</h1>

    <!-- Alert Preferences -->
    <div class="card mb-4">
        <div class="card-header">Alert Preferences</div>
        <div class="card-body">
            <form id="alertPrefsForm" class="row g-3">
                <div class="col-12">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="alertBrowser">
                        <label class="form-check-label" for="alertBrowser">Enable browser notifications</label>
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Alert types</label>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="signals" id="alertTypeSignals">
                        <label class="form-check-label" for="alertTypeSignals">New Signals</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="price" id="alertTypePrice">
                        <label class="form-check-label" for="alertTypePrice">Price Alerts</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="news" id="alertTypeNews">
                        <label class="form-check-label" for="alertTypeNews">News</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="stop" id="alertTypeStop">
                        <label class="form-check-label" for="alertTypeStop">Stop Loss Hit</label>
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Alert frequency</label>
                    <select class="form-select" id="alertFreq">
                        <option>Real-time</option>
                        <option>Hourly</option>
                        <option>Daily digest</option>
                    </select>
                </div>
            </form>
        </div>
    </div>

    <!-- Trading Preferences -->
    <div class="card mb-4">
        <div class="card-header">Trading Preferences</div>
        <div class="card-body">
            <form id="tradingPrefsForm" class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Capital Amount (₹)</label>
                    <input type="number" class="form-control" id="prefCapital" placeholder="100000">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Risk per Trade</label>
                    <select class="form-select" id="prefRisk">
                        <option>1%</option>
                        <option selected>2%</option>
                        <option>3%</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Min R:R Ratio</label>
                    <select class="form-select" id="prefMinRR">
                        <option>1:1</option>
                        <option>1:2</option>
                        <option>1:3</option>
                        <option>1:4</option>
                        <option>1:5</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Preferred Strategies</label>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="prefStratPullback">
                        <label class="form-check-label" for="prefStratPullback">Pullback</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="prefStratBreakout">
                        <label class="form-check-label" for="prefStratBreakout">Breakout</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="prefStratSupport">
                        <label class="form-check-label" for="prefStratSupport">Support Bounce</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="prefStratMACross">
                        <label class="form-check-label" for="prefStratMACross">MA Crossover</label>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Data Management -->
    <div class="card mb-4">
        <div class="card-header">Data Management</div>
        <div class="card-body">
            <button class="btn btn-warning" id="clearCacheBtn">Clear cache</button>
            <button class="btn btn-warning" id="clearSignalsBtn">Clear old signals (>30d)</button>
            <button class="btn btn-danger" id="resetDefaultsBtn">Reset to defaults</button>
        </div>
    </div>

    <!-- Display Settings -->
    <div class="card mb-4">
        <div class="card-header">Display Settings</div>
        <div class="card-body">
            <div class="form-check form-switch mb-2">
                <input class="form-check-input" type="checkbox" id="displayDarkMode">
                <label class="form-check-label" for="displayDarkMode">Dark mode</label>
            </div>
            <div class="mb-3">
                <label class="form-label">Chart color scheme</label>
                <select class="form-select" id="displayChartColor">
                    <option>Light</option>
                    <option>Dark</option>
                    <option>Colorful</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Table rows per page</label>
                <select class="form-select" id="displayRows">
                    <option>10</option>
                    <option selected>20</option>
                    <option>50</option>
                </select>
            </div>
        </div>
    </div>

    <!-- About & Disclaimer -->
    <div class="card mb-4">
        <div class="card-header">About & Disclaimer</div>
        <div class="card-body">
            <p>App version: 1.0.0</p>
            <p class="text-muted">Not financial advice; use at your own risk.</p>
            <p>Resources: <a href="https://www.investopedia.com" target="_blank">Investopedia</a>, <a href="https://www.nseindia.com" target="_blank">NSE</a></p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
<script src="../assets/js/app.js"></script>
<script type="module" src="../assets/js/settings.js"></script>
</body>
</html>
